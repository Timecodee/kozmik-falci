name: fal_uygulamasi
description: "Yapay Zeka Destekli Kahve, Tarot, Yüz ve El Falı Mobil Uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  # Bilgisayarınızdaki Dart 2.17.1 sürümüne uyumlu hale getirildi
  sdk: '>=2.17.1 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (Dart 2.17 ile uyumlu sürümlere çekildi)
  firebase_core: ^1.24.0

  # HTTP ve API
  http: ^0.13.5
  flutter_dotenv: ^5.0.2

  # State Management
  flutter_riverpod: ^1.0.4

  # UI ve Animasyonlar
  lottie: ^1.4.3
  flutter_spinkit: ^5.1.1
  image_picker: ^0.8.6
  image_cropper: ^3.0.0 # [NEW] Fotoğrafları kırpmak için (Eski sürüm)
  google_fonts: ^3.0.1

  # Reklam ve Hafıza
  google_mobile_ads: ^2.3.0
  shared_preferences: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/animations/